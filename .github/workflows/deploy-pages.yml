# Build the Vite frontend and publish it to GitHub Pages.
#
# One-time repo setup required:
#   1. Settings → Pages → Source: "GitHub Actions" (not "Deploy from a branch").
#   2. Settings → Secrets and variables → Actions → add repository secrets:
#        VITE_SUPABASE_URL        — your Supabase project URL
#        VITE_SUPABASE_ANON_KEY   — the anon (public) key
#        VITE_API_BASE            — the deployed Flask backend URL
#                                   (e.g. https://rebuildr-api.onrender.com)
#      These are baked into the static bundle at build time; the anon key and
#      API base are public by design — never put the service-role key here.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          GITHUB_PAGES: "1" # makes vite use base "/Rebuildr/"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: npm run build

      # GitHub Pages has no SPA rewrite rule — serving index.html as the 404
      # page lets client-side routes (e.g. /Rebuildr/dashboard) load on refresh.
      - name: SPA fallback
        run: cp frontend/dist/index.html frontend/dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
